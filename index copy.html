<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passarinho Jornada v3.1 (Web)</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: "Segoe UI", Arial, sans-serif;
    overflow: hidden;
    touch-action: none;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #gameCanvas {
    display: block;
    background: #000;
    width: 960px;
    height: 540px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  @media (max-width: 980px) {
    #gameCanvas {
      width: 100vw;
      height: 56.25vw;
    }
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="1920" height="1080"></canvas>

<script>
/* =========================================================
   PASSARINHO JORNADA v3.1 — COM IMAGENS
   ========================================================= */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const WIDTH = canvas.width;
const HEIGHT = canvas.height;
const CENTER_X = WIDTH / 2;
const CENTER_Y = HEIGHT / 2;

// --- GERENCIADOR DE ASSETS ---
let assets = {};
let assetsLoaded = 0;
let totalAssets = 0;
// Lista de todos os arquivos de imagem necessários
const assetFiles = {
    fundoMenu: './Play/images/Sterne (Landscape).png',
    fundoGame: './Scene0/images/Pyramids.png',
    fundoGameOver: './GAMEover/images/Cloudy sky.png',
    bird1: './Scene0/images/Bird fly-1.png',
    bird2: './Scene0/images/Bird fly-2.png',
    bird3: './Scene0/images/Bird fly-3.png',
    tree1: './Scene0/images/tree-6.png',
    tree2: './Scene0/images/tree-4.png',
    tree3: './Scene0/images/tree-7.png',
    plane: './Scene0/images/plane.png',
    owl: './Scene0/images/owl.png',
    owl2: './Scene0/images/owl-3.png',
    coracao: './Scene0/images/Card.png',
    gameOverImg: './GAMEover/images/Game Over.png',
    btnPlay: './Play/images/Btn-Play.png',
    btnPlayAgain: './GAMEover/images/Btn-Play-again.png',
    btnBack: './GAMEover/images/Btn-back.png',
    btnExit: './GAMEover/images/incorrect.png'
};

function loadAssets(callback) {
    totalAssets = Object.keys(assetFiles).length;
    for (const key in assetFiles) {
        assets[key] = new Image();
        assets[key].src = assetFiles[key];
        assets[key].onload = () => {
            assetsLoaded++;
            if (assetsLoaded === totalAssets) {
                callback();
            }
        };
        assets[key].onerror = () => {
          console.error(`Erro ao carregar imagem: ${assetFiles[key]}. Verifique o nome e se o arquivo está na pasta.`);
        }
    }
}

// --- ESTADOS DO JOGO ---
const SCENE = { LOADING: 'LOADING', PLAY: 'PLAY', GAME: 'GAME', GAMEOVER: 'GAMEOVER' };
let currentScene = SCENE.LOADING;

// --- VARIÁVEIS GLOBAIS DO JOGO ---
let gameVars = {}; // Será resetado no início de cada jogo

// --- INPUT ---
let inputPressed = false;
let clickCoords = { x: 0, y: 0 };

function handleInputDown(event) {
    inputPressed = true;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    if (event.touches) {
        clickCoords.x = (event.touches[0].clientX - rect.left) * scaleX;
        clickCoords.y = (event.touches[0].clientY - rect.top) * scaleY;
    } else {
        clickCoords.x = (event.clientX - rect.left) * scaleX;
        clickCoords.y = (event.clientY - rect.top) * scaleY;
    }
}
canvas.addEventListener('mousedown', handleInputDown);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInputDown(e); });
window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') inputPressed = true; });

// --- CLASSES DE OBJETOS ---
class Bird {
    constructor() {
        this.x = CENTER_X - 441;
        this.y = CENTER_Y + 70;
        this.vy = 0;
        this.gravity = 0.8; // Equivalente à física do Pocket Code
        this.jump = -20;
        this.frames = [assets.bird1, assets.bird2, assets.bird3];
        this.currentFrame = 0;
        this.frameCounter = 0;
        this.width = this.frames[0].width;
        this.height = this.frames[0].height;
    }

    update() {
        this.vy += this.gravity;
        this.y += this.vy;

        if (this.y > HEIGHT || this.y < -this.height) {
            if (!gameVars.coracaovida) triggerGameOver();
        }

        if (inputPressed) {
            this.vy = this.jump;
            inputPressed = false;
            this.currentFrame = 1; // Animação de pulo
        }
        
        // Animação de voo
        this.frameCounter++;
        if (this.vy > 0 && this.frameCounter % 10 === 0) { // caindo
            this.currentFrame = 0;
        } else if (this.vy < 0) { // subindo
            this.currentFrame = 2;
        }
    }

    draw() {
        ctx.drawImage(this.frames[this.currentFrame], this.x - this.width / 2, this.y - this.height / 2);
    }
    
    getBounds() { return { x: this.x - this.width/2, y: this.y - this.height/2, w: this.width, h: this.height }; }
}

class Obstacle {
    constructor(type, x, y, speedX) {
        this.type = type;
        this.image = assets[type];
        this.width = this.image.width;
        this.height = this.image.height;
        this.x = x;
        this.y = y;
        this.speedX = speedX;
    }

    update() {
        this.x += this.speedX;
        if (this.x < -this.width) this.respawn();
    }
    
    respawn() {
        this.x = WIDTH + Math.random() * 200;
        this.speedX = -5 - Math.random() * 5; // Velocidade aleatória
        if(this.type === 'plane') {
            this.y = 100 + Math.random() * (HEIGHT / 2);
        } else {
            this.y = HEIGHT - this.height - (Math.random() * 100);
        }
    }

    draw() { ctx.drawImage(this.image, this.x, this.y); }
    getBounds() { return { x: this.x, y: this.y, w: this.width, h: this.height }; }
}

class Heart {
    constructor() {
        this.visible = false;
        this.x = WIDTH - 200;
        this.y = 50;
        this.width = assets.coracao.width * 0.5; // Tamanho reduzido
        this.height = assets.coracao.height * 0.5;
        this.timer = 0;
    }
    show() { this.visible = true; gameVars.coracaovida = true; this.timer = 30 * 60; }
    update() {
        if (!this.visible) return;
        this.timer--;
        if (this.timer <= 0) {
            this.visible = false;
            gameVars.coracaovida = false;
        }
    }
    draw() { if (this.visible) ctx.drawImage(assets.coracao, this.x, this.y, this.width, this.height); }
}

class Owl {
    constructor() {
        this.visible = false;
        this.x = WIDTH - 300;
        this.y = HEIGHT - 300;
        this.frames = [assets.owl, assets.owl2];
        this.currentFrame = 0;
        this.frameCounter = 0;
        this.timer = 0;
        this.message = "Continue! Você ganhou um coração!";
    }
    show() { this.visible = true; this.timer = 5 * 60; } // 5 segundos
    update() {
        if (!this.visible) return;
        this.timer--;
        this.frameCounter++;
        if (this.frameCounter % 30 === 0) this.currentFrame = (this.currentFrame + 1) % 2;
        if (this.timer <= 0) this.visible = false;
    }
    draw() {
        if (!this.visible) return;
        ctx.drawImage(this.frames[this.currentFrame], this.x, this.y);
        // Balão de fala
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.roundRect(this.x - 220, this.y - 70, 400, 60, 15);
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(this.message, this.x - 20, this.y - 30);
    }
}

// --- BOTÕES ---
class Button {
    constructor(img, x, y) {
        this.img = img;
        this.x = x - img.width / 2;
        this.y = y - img.height / 2;
        this.width = img.width;
        this.height = img.height;
    }
    draw() { ctx.drawImage(this.img, this.x, this.y); }
    isClicked(px, py) {
        return px > this.x && px < this.x + this.width && py > this.y && py < this.y + this.height;
    }
}
let btnPlay, btnExit, btnPlayAgain, btnBack;

// --- GERENCIADOR DO JOGO ---
let bird, obstacles, heart, owl, frameCount;

function checkCollision(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function resetGameVars() {
    gameVars = {
        contador: 0, distanciap: 0, meta: 0, passada: 0, colisao: false,
        coracaovida: false, transicao: 0, kmMode: false
    };
    bird = new Bird();
    obstacles = [
        new Obstacle('tree1', WIDTH, HEIGHT - assets.tree1.height, -5),
        new Obstacle('tree2', WIDTH + 500, HEIGHT - assets.tree2.height, -6),
        new Obstacle('tree3', WIDTH + 1000, HEIGHT - assets.tree3.height - 50, -7),
        new Obstacle('plane', WIDTH + 700, 200, -10),
    ];
    heart = new Heart();
    owl = new Owl();
    frameCount = 0;
}

function startGame() {
    currentScene = SCENE.GAME;
    resetGameVars();
}

function triggerGameOver() {
    if (gameVars.colisao) return;
    gameVars.colisao = true;
    currentScene = SCENE.GAMEOVER;
}

function backToMenu() { currentScene = SCENE.PLAY; }

// --- LOOP PRINCIPAL ---
function loop(timestamp) {
    ctx.clearRect(0, 0, WIDTH, HEIGHT);

    switch (currentScene) {
        case SCENE.LOADING:
            drawLoading();
            break;
        case SCENE.PLAY:
            drawMenu();
            break;
        case SCENE.GAME:
            updateGameplay();
            drawGameplay();
            break;
        case SCENE.GAMEOVER:
            drawGameOver();
            break;
    }
    
    inputPressed = false; // reseta o clique no final do frame
    clickCoords = { x: 0, y: 0 };
    requestAnimationFrame(loop);
}

// --- FUNÇÕES DE CENA ---
function drawLoading() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.fillStyle = "white";
    ctx.font = "50px Arial";
    ctx.textAlign = "center";
    ctx.fillText(`Carregando... ${assetsLoaded}/${totalAssets}`, CENTER_X, CENTER_Y);
}

function drawMenu() {
    ctx.drawImage(assets.fundoMenu, 0, 0, WIDTH, HEIGHT);
    
    ctx.fillStyle = '#FF00BB';
    ctx.font = 'bold 120px Arial';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'black'; ctx.shadowBlur = 10;
    ctx.fillText('jornada do passarim', CENTER_X, 300);

    ctx.fillStyle = '#FB3C57';
    ctx.font = '50px Arial';
    ctx.fillText('by Johnson Gomes', CENTER_X, HEIGHT - 100);
    ctx.shadowBlur = 0;

    btnPlay.draw();
    btnExit.draw();

    if (clickCoords.x > 0) {
        if (btnPlay.isClicked(clickCoords.x, clickCoords.y)) startGame();
        if (btnExit.isClicked(clickCoords.x, clickCoords.y)) window.close(); // Fecha a aba
    }
}

function updateGameplay() {
    bird.update();
    frameCount++;

    obstacles.forEach(obs => {
        obs.update();
        if (checkCollision(bird.getBounds(), obs.getBounds())) {
            if (!gameVars.coracaovida) {
                triggerGameOver();
            } else {
                gameVars.colisao = true; // Marca a colisão, mas não morre
                gameVars.coracaovida = false;
                heart.visible = false;
                // Efeito visual de colisão (opcional, como piscar o pássaro)
            }
        }
    });
    
    // Resetar flag de colisão se o jogador não estiver mais tocando
    gameVars.colisao = false;
    
    if(heart) heart.update();
    if(owl) owl.update();

    if (frameCount % 5 === 0) gameVars.contador++;
    
    if (gameVars.contador >= 1000) {
        gameVars.distanciap++;
        gameVars.contador = 0;
        gameVars.kmMode = true;
        setTimeout(() => gameVars.kmMode = false, 1000);
    }
    
    gameVars.meta++;
    if (gameVars.meta >= 2000 && gameVars.passada < 2000) { // Acontece só uma vez
        gameVars.passada = 2000;
        gameVars.meta = 0;
        heart.show();
        owl.show();
    }
}

function drawGameplay() {
    ctx.drawImage(assets.fundoGame, 0, 0, WIDTH, HEIGHT);
    obstacles.forEach(obs => obs.draw());
    bird.draw();
    if(heart) heart.draw();
    if(owl) owl.draw();

    ctx.fillStyle = 'white';
    ctx.font = 'bold 60px Arial';
    ctx.textAlign = 'left';
    ctx.strokeStyle = 'black'; ctx.lineWidth = 5;
    
    let scoreText = gameVars.kmMode ? `${gameVars.distanciap} km` : `${gameVars.contador}`;
    ctx.strokeText(scoreText, 50, 80);
    ctx.fillText(scoreText, 50, 80);
}

function drawGameOver() {
    ctx.drawImage(assets.fundoGameOver, 0, 0, WIDTH, HEIGHT);
    ctx.drawImage(assets.gameOverImg, CENTER_X - assets.gameOverImg.width / 2, 100);

    ctx.fillStyle = '#F13670';
    ctx.font = 'bold 60px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Distância percorrida:', CENTER_X, 450);
    ctx.font = 'bold 100px Arial';
    ctx.fillText(`${gameVars.distanciap} km e ${gameVars.contador} m`, CENTER_X, 580);
    
    btnPlayAgain.draw();
    btnBack.draw();
    btnExit.draw();

    if (clickCoords.x > 0) {
        if (btnPlayAgain.isClicked(clickCoords.x, clickCoords.y)) startGame();
        if (btnBack.isClicked(clickCoords.x, clickCoords.y)) backToMenu();
        if (btnExit.isClicked(clickCoords.x, clickCoords.y)) window.close();
    }
}

// Adiciona roundRect se não existir
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) { /*...*/ };
}

// --- INICIALIZAÇÃO ---
function init() {
    // Cria os botões depois que as imagens carregaram
    btnPlay = new Button(assets.btnPlay, CENTER_X, CENTER_Y + 100);
    btnExit = new Button(assets.btnExit, WIDTH - 100, 100);
    btnPlayAgain = new Button(assets.btnPlayAgain, CENTER_X, 750);
    btnBack = new Button(assets.btnBack, CENTER_X, 900);
    // Inicia o loop do jogo
    requestAnimationFrame(loop);
}

// Inicia o carregamento dos assets e, quando terminar, chama a função init
loadAssets(init);
requestAnimationFrame(loop); // Inicia o loop para mostrar a tela de "Loading"

</script>
</body>
</html>
