<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Jornada Do Passarin - Painel</title>
  <link rel="stylesheet" href="../css/styledashboard.css">
</head>
<body>
  <div class="dashboard-container">
    <h2>Painel do Usuário</h2>
    <p>Bem-vindo, <span id="usernameDisplay"></span>!</p>
    <button onclick="location.href='game.html'">Jogar</button>
    <button onclick="location.href='logout.html'">Sair</button>
  </div>

  <script type="module">
  import { getUser, logout } from '../js/auth.js'

  window.logoutUser = logout

  async function check() {
    const user = await getUser()
    console.log(user.user_metadata.username)

    if (!user) {
      window.location.href = '/pages/login.html'
    } else {
      document.getElementById('usernameDisplay').innerText = user.user_metadata.username
    }
  }

  check()
  </script>
</body>
</html>
