 <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Jornada Passarin v 0,4> (Web com Imagens)</title>
<!-- Estilos básicos para o jogo -->
<link rel="stylesheet" href="../css/stylegame.css">
</head>
<body>

<!-- Tela de carregamento -->
<div id="loading">
  <div>Carregando assets...</div>
  <div class="loader"><div class="loader-bar" id="loaderBar"></div></div>
</div>
<!-- Canvas do jogo -->
<canvas id="gameCanvas" width="960" height="540"></canvas>

<div style="text-align: column;">
  <button style="margin: 10px;" onclick="location.href='/pages/dashboard.html'">Dashboard</button>
  <button style="margin: 10px;" onclick="fullscreenCanvas()">Tela Cheia</button>

</div>
<!-- Script principal do jogo -->
<script src="/js/logicagame.js"></script>
<script>
function ajustarTela() {
  const canvas = document.getElementById('gameCanvas')

  const scaleX = window.innerWidth / 960
  const scaleY = window.innerHeight / 540

  const scale = Math.min(scaleX, scaleY)

  canvas.style.width = (960 * scale) + 'px'
  canvas.style.height = (540 * scale) + 'px'
}

window.addEventListener('resize', ajustarTela)
window.onload = ajustarTela
  
function fullscreenCanvas() {
  const canvas = document.getElementById('gameCanvas')

  if (canvas.requestFullscreen) {
    canvas.requestFullscreen()
  }

  ajustarTela()
}
</script>
</body>
</html>
