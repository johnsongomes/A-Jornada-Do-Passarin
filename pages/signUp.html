<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Jornada Do Passarin - Cadastro</title>
  <link rel="stylesheet" href="../css/stylesignup.css">
</head>
<body>
  <div class="signup-container">
    <h2>Cadastro</h2>
    <form id="signupForm">
      <input type="text" id="username" placeholder="Nome de usuário" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Senha" required>
      <button type="button" onclick="register()">Cadastrar</button>
    </form>
  </div>
  <div>
    <h3>Já tem uma conta? Faça login</h3>
    <button onclick="location.href='login.html'">Faça login</button>
    <button onclick="location.href='/index.html'">Home</button>
  </div>

  <script type="module">
  import { signUp } from '../js/auth.js'

  window.register = async () => {
    console.log('Registrando usuário...')
    const username = document.getElementById('username').value
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value

    await signUp(username, email, password)
  }
  </script>
</body>
</html>
